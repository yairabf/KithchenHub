# Fastlane-based store pipeline on GitHub-hosted runners (no EAS build/submit).
# Generates native projects with `expo prebuild`, then runs existing lanes in mobile/fastlane.
#
# Required repository secrets:
#   EXPO_PUBLIC_API_URL              Production API base URL (not localhost)
#   ASC_KEY_ID, ASC_ISSUER_ID        App Store Connect API key metadata
#   ASC_KEY_P8                       Contents of the .p8 private key file
#   ANDROID_KEYSTORE_BASE64        Release keystore file, base64-encoded
#   ANDROID_KEYSTORE_PASSWORD
#   ANDROID_KEY_ALIAS
#   ANDROID_KEY_PASSWORD
#   GOOGLE_PLAY_SERVICE_ACCOUNT_JSON  Google Play service account JSON (Play Console API access)
#
# Callers pass workflow_call inputs:
#   ios_app_store_submit       — run fastlane ios prod (submit for App Store review) after TestFlight
#   android_production_promote — run fastlane android prod (internal → production draft) after internal upload

name: Mobile native store release (Fastlane)

on:
  workflow_call:
    inputs:
      ios_app_store_submit:
        description: "Run fastlane ios prod after TestFlight upload (submit for App Store review)"
        type: boolean
        required: false
        default: false
      android_production_promote:
        description: "Run fastlane android prod after internal upload (promote to production draft)"
        type: boolean
        required: false
        default: false

concurrency:
  group: mobile-native-store-release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  android:
    name: Android (Fastlane)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Validate Android secrets
        env:
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "$EXPO_PUBLIC_API_URL" ]; then echo "Missing EXPO_PUBLIC_API_URL"; exit 1; fi
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then echo "Missing ANDROID_KEYSTORE_BASE64"; exit 1; fi
          if [ -z "$ANDROID_KEYSTORE_PASSWORD" ]; then echo "Missing ANDROID_KEYSTORE_PASSWORD"; exit 1; fi
          if [ -z "$ANDROID_KEY_ALIAS" ]; then echo "Missing ANDROID_KEY_ALIAS"; exit 1; fi
          if [ -z "$ANDROID_KEY_PASSWORD" ]; then echo "Missing ANDROID_KEY_PASSWORD"; exit 1; fi
          if [ -z "$GOOGLE_PLAY_SERVICE_ACCOUNT_JSON" ]; then echo "Missing GOOGLE_PLAY_SERVICE_ACCOUNT_JSON"; exit 1; fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: >-
            platform-tools
            platforms;android-35
            build-tools;35.0.0

      - name: Install npm dependencies
        run: npm ci

      - name: Write Play service account key and keystore
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          printf '%s\n' "$GOOGLE_PLAY_SERVICE_ACCOUNT_JSON" > "$RUNNER_TEMP/play-api.json"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
          chmod 600 "$RUNNER_TEMP/release.keystore" "$RUNNER_TEMP/play-api.json"

      - name: Generate native Android project (Expo prebuild)
        env:
          CI: "1"
          EXPO_NO_TELEMETRY: "1"
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
        run: npx expo prebuild --platform android --clean --no-install

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version-file: mobile/.ruby-version
          bundler-cache: true
          working-directory: mobile

      - name: Fastlane Android internal (Play internal track)
        working-directory: mobile
        env:
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
          SUPPLY_JSON_KEY: ${{ runner.temp }}/play-api.json
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: bundle exec fastlane android internal

      - name: Fastlane Android prod (promote internal → production draft)
        if: ${{ inputs.android_production_promote }}
        working-directory: mobile
        env:
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
          SUPPLY_JSON_KEY: ${{ runner.temp }}/play-api.json
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: bundle exec fastlane android prod

  ios:
    name: iOS (Fastlane)
    runs-on: macos-15
    timeout-minutes: 120
    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Validate iOS secrets
        env:
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
        run: |
          if [ -z "$EXPO_PUBLIC_API_URL" ]; then echo "Missing EXPO_PUBLIC_API_URL"; exit 1; fi
          if [ -z "$ASC_KEY_ID" ]; then echo "Missing ASC_KEY_ID"; exit 1; fi
          if [ -z "$ASC_ISSUER_ID" ]; then echo "Missing ASC_ISSUER_ID"; exit 1; fi
          if [ -z "$ASC_KEY_P8" ]; then echo "Missing ASC_KEY_P8"; exit 1; fi
          if [ -z "$MATCH_PASSWORD" ]; then echo "Missing MATCH_PASSWORD"; exit 1; fi
          if [ -z "$MATCH_GIT_BASIC_AUTHORIZATION" ]; then echo "Missing MATCH_GIT_BASIC_AUTHORIZATION"; exit 1; fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version-file: mobile/.ruby-version
          bundler-cache: true
          working-directory: mobile

      - name: Install npm dependencies
        run: npm ci

      - name: Write App Store Connect API key
        env:
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
        run: |
          printf '%s\n' "$ASC_KEY_P8" > "$RUNNER_TEMP/AuthKey.p8"
          chmod 600 "$RUNNER_TEMP/AuthKey.p8"

      - name: Generate native iOS project (Expo prebuild)
        env:
          CI: "1"
          EXPO_NO_TELEMETRY: "1"
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
        run: npx expo prebuild --platform ios --clean --no-install

      - name: Fastlane iOS internal (TestFlight)
        working-directory: mobile
        env:
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_PATH: ${{ runner.temp }}/AuthKey.p8
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          FASTLANE_XCODEBUILD_SETTINGS_TIMEOUT: "120"
          FASTLANE_XCODEBUILD_SETTINGS_RETRIES: "5"
        run: bundle exec fastlane ios internal

      - name: Upload gym build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gym-build-log
          path: ~/Library/Logs/gym/
          retention-days: 5

      - name: Fastlane iOS prod (submit for App Store review)
        if: ${{ inputs.ios_app_store_submit }}
        working-directory: mobile
        env:
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_PATH: ${{ runner.temp }}/AuthKey.p8
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          FASTLANE_XCODEBUILD_SETTINGS_TIMEOUT: "120"
          FASTLANE_XCODEBUILD_SETTINGS_RETRIES: "5"
        run: bundle exec fastlane ios prod
