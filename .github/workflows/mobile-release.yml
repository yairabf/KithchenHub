name: Mobile Release (EAS Build / optional Submit)

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Which platform(s) to build"
        required: true
        default: "both"
        type: choice
        options:
          - ios
          - android
          - both
      submit:
        description: "Submit the latest build(s) to store(s) after build"
        required: true
        default: false
        type: boolean

concurrency:
  group: mobile-release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  release:
    name: Build (and optionally submit)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install mobile dependencies
        working-directory: mobile
        run: npm ci

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Validate Expo auth for CI
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "EXPO_TOKEN secret is required to run EAS in CI."
            exit 1
          fi

      - name: Build iOS (production)
        if: ${{ inputs.platform == 'ios' || inputs.platform == 'both' }}
        working-directory: mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas build --platform ios --profile production --non-interactive

      - name: Build Android (production)
        if: ${{ inputs.platform == 'android' || inputs.platform == 'both' }}
        working-directory: mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas build --platform android --profile production --non-interactive

      - name: Submit iOS (latest)
        if: ${{ inputs.submit && (inputs.platform == 'ios' || inputs.platform == 'both') }}
        working-directory: mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          echo "Submitting latest iOS build via EAS Submit..."
          echo "Note: For CI submit, configure App Store Connect API Key and ios.ascAppId in eas.json submit profile."
          eas submit --platform ios --latest --profile production --non-interactive

      - name: Submit Android (latest)
        if: ${{ inputs.submit && (inputs.platform == 'android' || inputs.platform == 'both') }}
        working-directory: mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          echo "Submitting latest Android build via EAS Submit..."
          echo "Note: For CI submit, configure Google Play credentials and submit profile in eas.json."
          eas submit --platform android --latest --profile production --non-interactive

