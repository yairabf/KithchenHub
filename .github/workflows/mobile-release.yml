name: Mobile Release (EAS Build / optional Submit)

# Manually triggered from the GitHub Actions UI.
# Builds on EAS cloud infrastructure (free tier: 30 builds/month).
# No macOS runner needed — all signing is handled remotely by EAS.
#
# Prerequisites (one-time setup):
#   1. Add EXPO_TOKEN secret: GitHub repo → Settings → Secrets → Actions
#      Create at: https://expo.dev/settings/access-tokens
#   2. For iOS submit: fill in eas.json submit.production.ios.ascAppId
#      (find it in App Store Connect → Apps → select app → App Information)

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "Build profile"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - preview
      platform:
        description: "Which platform(s) to build"
        required: true
        default: "both"
        type: choice
        options:
          - ios
          - android
          - both
      submit:
        description: "Submit the latest build(s) to stores after build completes"
        required: true
        default: false
        type: boolean
      ref:
        description: "Branch or commit SHA to build from (default: main)"
        required: false
        default: "main"

concurrency:
  group: mobile-release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  release:
    name: "EAS ${{ inputs.profile }} (${{ inputs.platform }})"
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || 'main' }}
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install mobile dependencies
        working-directory: mobile
        run: npm ci

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Validate EXPO_TOKEN
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "::error::EXPO_TOKEN secret is not set."
            echo "Create one at https://expo.dev/settings/access-tokens"
            echo "then add it under GitHub repo → Settings → Secrets → Actions → New repository secret"
            exit 1
          fi
          echo "✓ EXPO_TOKEN is present"

      - name: Build iOS
        if: ${{ inputs.platform == 'ios' || inputs.platform == 'both' }}
        working-directory: mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          echo "Building iOS (${{ inputs.profile }})..."
          eas build --platform ios --profile ${{ inputs.profile }} --non-interactive

      - name: Build Android
        if: ${{ inputs.platform == 'android' || inputs.platform == 'both' }}
        working-directory: mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          echo "Building Android (${{ inputs.profile }})..."
          eas build --platform android --profile ${{ inputs.profile }} --non-interactive

      - name: Submit iOS to App Store
        if: ${{ inputs.submit && inputs.profile == 'production' && (inputs.platform == 'ios' || inputs.platform == 'both') }}
        working-directory: mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          echo "Submitting latest iOS build to TestFlight..."
          eas submit --platform ios --latest --profile production --non-interactive

      - name: Submit Android to Play Store
        if: ${{ inputs.submit && inputs.profile == 'production' && (inputs.platform == 'android' || inputs.platform == 'both') }}
        working-directory: mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          echo "Submitting latest Android build to Play Store internal track..."
          eas submit --platform android --latest --profile production --non-interactive
